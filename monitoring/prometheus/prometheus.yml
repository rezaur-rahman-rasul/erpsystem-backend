global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - gateway:8080

  - job_name: identity-access
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - identity-access:8081

  - job_name: master-data
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - master-data:8082

  - job_name: organization
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - organization:8083
