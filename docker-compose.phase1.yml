version: "3.9"

services:
  gateway:
    build:
      context: ./gateway
    container_name: erp-gateway
    environment:
      SERVER_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_SECURITY_JWT_SECRET: change-this-to-a-long-random-base64-like-secret-key
      APP_SECURITY_JWT_ISSUER: enterprise-platform
      SERVICES_IDENTITY_ACCESS_URI: http://identity-access:8081
      SERVICES_MASTER_DATA_URI: http://master-data:8082
      SERVICES_ORGANIZATION_URI: http://organization:8083
    ports:
      - "8080:8080"
    depends_on:
      - identity-access
      - master-data
      - organization
      - redis

  identity-access:
    build:
      context: ./identity-access
    container_name: identity-access-service
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://identity-postgres:5432/identity_access_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_SECURITY_JWT_SECRET: change-this-to-a-long-random-base64-like-secret-key
      APP_SECURITY_JWT_ISSUER: enterprise-platform
    ports:
      - "8081:8081"
    depends_on:
      - identity-postgres
      - redis
      - kafka

  master-data:
    build:
      context: ./master-data
    container_name: master-data-service
    environment:
      SERVER_PORT: 8082
      DB_URL: jdbc:postgresql://master-data-postgres:5432/master_data_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_SECURITY_JWT_SECRET: change-this-to-a-long-random-base64-like-secret-key
      APP_SECURITY_JWT_ISSUER: enterprise-platform
    ports:
      - "8082:8082"
    depends_on:
      - master-data-postgres
      - redis
      - kafka

  organization:
    build:
      context: ./organization
    container_name: organization-service
    environment:
      SERVER_PORT: 8083
      DB_URL: jdbc:postgresql://organization-postgres:5432/enterprise_structure_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_SECURITY_JWT_SECRET: change-this-to-a-long-random-base64-like-secret-key
      APP_SECURITY_JWT_ISSUER: enterprise-platform
    ports:
      - "8083:8083"
    depends_on:
      - organization-postgres
      - redis
      - kafka

  identity-postgres:
    image: postgres:16
    container_name: identity-postgres
    environment:
      POSTGRES_DB: identity_access_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - identity_postgres_data:/var/lib/postgresql/data

  master-data-postgres:
    image: postgres:16
    container_name: master-data-postgres
    environment:
      POSTGRES_DB: master_data_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - master_data_postgres_data:/var/lib/postgresql/data

  organization-postgres:
    image: postgres:16
    container_name: organization-postgres
    environment:
      POSTGRES_DB: enterprise_structure_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - organization_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: organization-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  kafka:
    image: bitnami/kafka:3.7
    container_name: organization-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_KRAFT_CLUSTER_ID: abcdefghijklmnopqrstuv
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka

volumes:
  identity_postgres_data:
  master_data_postgres_data:
  organization_postgres_data:
  redis_data:
  kafka_data:
