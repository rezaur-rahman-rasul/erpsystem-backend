name: ${COMPOSE_PROJECT_NAME:-hishabnikash-phase1}

x-app-environment: &app-environment
  SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-container}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  APP_SECURITY_JWT_SECRET: ${APP_SECURITY_JWT_SECRET}
  APP_SECURITY_JWT_ISSUER: ${APP_SECURITY_JWT_ISSUER}

x-app-service: &app-service
  restart: unless-stopped
  init: true
  networks:
    - erp-backend
  stop_grace_period: 30s

services:
  gateway:
    <<: *app-service
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      <<: *app-environment
      SERVER_PORT: 8080
      SERVICES_IDENTITY_ACCESS_URI: http://identity-access:8081
      SERVICES_MASTER_DATA_URI: http://master-data:8082
      SERVICES_ORGANIZATION_URI: http://organization:8083
    ports:
      - "${GATEWAY_PUBLIC_PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy
      identity-access:
        condition: service_healthy
      master-data:
        condition: service_healthy
      organization:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health/readiness >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  identity-access:
    <<: *app-service
    build:
      context: .
      dockerfile: identity-access/Dockerfile
    environment:
      <<: *app-environment
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://identity-postgres:5432/${IDENTITY_DB_NAME}
      DB_USERNAME: ${IDENTITY_DB_USER}
      DB_PASSWORD: ${IDENTITY_DB_PASSWORD}
      APP_BOOTSTRAP_ADMIN_USERNAME: ${IDENTITY_BOOTSTRAP_ADMIN_USERNAME}
      APP_BOOTSTRAP_ADMIN_EMAIL: ${IDENTITY_BOOTSTRAP_ADMIN_EMAIL}
      APP_BOOTSTRAP_ADMIN_PASSWORD: ${IDENTITY_BOOTSTRAP_ADMIN_PASSWORD}
      APP_BOOTSTRAP_ADMIN_TENANT_ID: ${IDENTITY_BOOTSTRAP_ADMIN_TENANT_ID}
      APP_BOOTSTRAP_ADMIN_DISPLAY_NAME: ${IDENTITY_BOOTSTRAP_ADMIN_DISPLAY_NAME}
    expose:
      - "8081"
    depends_on:
      identity-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8081/actuator/health/readiness >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 75s

  master-data:
    <<: *app-service
    build:
      context: .
      dockerfile: master-data/Dockerfile
    environment:
      <<: *app-environment
      SERVER_PORT: 8082
      DB_URL: jdbc:postgresql://master-data-postgres:5432/${MASTER_DATA_DB_NAME}
      DB_USERNAME: ${MASTER_DATA_DB_USER}
      DB_PASSWORD: ${MASTER_DATA_DB_PASSWORD}
    expose:
      - "8082"
    depends_on:
      master-data-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8082/actuator/health/readiness >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 75s

  organization:
    <<: *app-service
    build:
      context: .
      dockerfile: organization/Dockerfile
    environment:
      <<: *app-environment
      SERVER_PORT: 8083
      DB_URL: jdbc:postgresql://organization-postgres:5432/${ORGANIZATION_DB_NAME}
      DB_USERNAME: ${ORGANIZATION_DB_USER}
      DB_PASSWORD: ${ORGANIZATION_DB_PASSWORD}
    expose:
      - "8083"
    depends_on:
      organization-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8083/actuator/health/readiness >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 75s

  identity-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${IDENTITY_DB_NAME}
      POSTGRES_USER: ${IDENTITY_DB_USER}
      POSTGRES_PASSWORD: ${IDENTITY_DB_PASSWORD}
    volumes:
      - identity_postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - erp-backend

  master-data-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MASTER_DATA_DB_NAME}
      POSTGRES_USER: ${MASTER_DATA_DB_USER}
      POSTGRES_PASSWORD: ${MASTER_DATA_DB_PASSWORD}
    volumes:
      - master_data_postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - erp-backend

  organization-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ORGANIZATION_DB_NAME}
      POSTGRES_USER: ${ORGANIZATION_DB_USER}
      POSTGRES_PASSWORD: ${ORGANIZATION_DB_PASSWORD}
    volumes:
      - organization_postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - erp-backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - erp-backend

  kafka:
    image: bitnami/kafka:3.7
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS:-true}
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_NUM_PARTITIONS: ${KAFKA_DEFAULT_PARTITIONS:-3}
      KAFKA_KRAFT_CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID}
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    expose:
      - "9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 40s
    networks:
      - erp-backend

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    profiles:
      - observability
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    depends_on:
      gateway:
        condition: service_healthy
      identity-access:
        condition: service_healthy
      master-data:
        condition: service_healthy
      organization:
        condition: service_healthy
    networks:
      - erp-backend

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    profiles:
      - observability
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    expose:
      - "3000"
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - erp-backend

volumes:
  identity_postgres_data:
  master_data_postgres_data:
  organization_postgres_data:
  redis_data:
  kafka_data:
  prometheus_data:
  grafana_data:

networks:
  erp-backend:
    driver: bridge
