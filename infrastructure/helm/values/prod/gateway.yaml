nameOverride: gateway

replicaCount: 3

image:
  repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/erp/gateway
  tag: prod-stable

containerPort: 8080

env:
  - name: SPRING_PROFILES_ACTIVE
    value: container
  - name: REDIS_HOST
    value: erp-prod.xxxxxx.use1.cache.amazonaws.com
  - name: REDIS_PORT
    value: "6379"
  - name: SPRING_DATA_REDIS_SSL_ENABLED
    value: "true"
  - name: APP_SECURITY_JWT_ISSUER
    value: enterprise-platform
  - name: SERVICES_IDENTITY_ACCESS_URI
    value: http://identity-access.erp-identity-access.svc.cluster.local
  - name: SERVICES_MASTER_DATA_URI
    value: http://master-data.erp-master-data.svc.cluster.local
  - name: SERVICES_ORGANIZATION_URI
    value: http://organization.erp-organization.svc.cluster.local

envFromSecrets:
  - gateway-runtime

resources:
  requests:
    cpu: 500m
    memory: 1024Mi
  limits:
    cpu: 2000m
    memory: 2048Mi

preStopSleepSeconds: 20

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  cpuUtilizationPercentage: 65
  memoryUtilizationPercentage: 75

pdb:
  enabled: true
  minAvailable: 2

ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health/readiness
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:123456789012:certificate/REPLACE_ME
    alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:us-east-1:123456789012:regional/webacl/REPLACE_ME
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=60,routing.http.drop_invalid_header_fields.enabled=true,deletion_protection.enabled=true
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix

networkPolicy:
  enabled: false

externalSecret:
  enabled: true
  targetName: gateway-runtime
  data:
    - secretKey: SPRING_DATA_REDIS_PASSWORD
      remoteKey: /erp/prod/gateway/runtime
      property: SPRING_DATA_REDIS_PASSWORD
    - secretKey: APP_SECURITY_JWT_SECRET
      remoteKey: /erp/prod/gateway/runtime
      property: APP_SECURITY_JWT_SECRET
