spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://organization-postgres:5432/organization_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  Kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
  flyway:
    enabled: true

management:
  health:
    redis:
      enabled: true
