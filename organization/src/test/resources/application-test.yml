spring:
  datasource:
    url: jdbc:h2:mem:enterprise_structure_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  kafka:
    listener:
      auto-startup: false
  cache:
    type: simple
  data:
    redis:
      repositories:
        enabled: false

management:
  health:
    redis:
      enabled: false
    db:
      enabled: true

logging:
  level:
    root: WARN
