spring:
  datasource:
    url: jdbc:h2:mem:masterdata;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  cache:
    type: simple
  data:
    redis:
      repositories:
        enabled: false
  kafka:
    listener:
      auto-startup: false

management:
  health:
    redis:
      enabled: false

app:
  security:
    jwt:
      secret: change-this-to-a-long-random-base64-like-secret-key
      issuer: enterprise-platform
