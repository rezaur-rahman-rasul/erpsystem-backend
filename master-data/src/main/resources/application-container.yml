spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://master-data-postgres:5432/master_data_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    listener:
      auto-startup: true
  flyway:
    enabled: true

management:
  health:
    redis:
      enabled: true
