server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
      repositories:
        enabled: false
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins:
              - http://127.0.0.1
              - http://localhost
              - http://localhost:4200
              - http://localhost:4201
              - http://localhost:8080
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
      routes:
        - id: identity-access
          uri: ${services.identity-access.uri:http://localhost:8081}
          predicates:
            - Path=/identity/**
          filters:
            - StripPrefix=1
        - id: organization
          uri: ${services.organization.uri:http://localhost:8083}
          predicates:
            - Path=/organization/**
          filters:
            - StripPrefix=1
        - id: master-data
          uri: ${services.master-data.uri:http://localhost:8082}
          predicates:
            - Path=/master-data/**
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    redis:
      enabled: true

info:
  app:
    name: Gateway Service
    description: Phase 1 gateway service for ERP microservices
    version: 0.0.1-SNAPSHOT

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.hisabnikash.erp.gateway: INFO

app:
  security:
    jwt:
      secret: change-this-to-a-long-random-base64-like-secret-key
      issuer: enterprise-platform
  gateway:
    tenant-aware-prefixes:
      - /organization
      - /master-data
    throttling:
      enabled: true
      requests-per-minute: 120
