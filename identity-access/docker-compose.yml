version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: identity-access-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${IDENTITY_DB_NAME:-identity_access_db}
      POSTGRES_USER: ${IDENTITY_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${IDENTITY_DB_PASSWORD:-postgres}
    ports:
      - "${IDENTITY_DB_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d identity_access_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hishabnikash-identity-access-local-network

  redis:
    image: redis:7
    container_name: identity-access-redis
    restart: unless-stopped
    ports:
      - "${IDENTITY_REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - hishabnikash-identity-access-local-network

  kafka:
    image: bitnami/kafka:3.7
    container_name: identity-access-kafka
    restart: unless-stopped
    ports:
      - "${IDENTITY_KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://${IDENTITY_KAFKA_ADVERTISED_HOST:-localhost}:${IDENTITY_KAFKA_HOST_PORT:-9092}
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_KRAFT_CLUSTER_ID: ${IDENTITY_KAFKA_KRAFT_CLUSTER_ID:-abcdefghijklmnopqrstuv}
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - hishabnikash-identity-access-local-network

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  hishabnikash-identity-access-local-network:
    name: hishabnikash-identity-access-local-network
    driver: bridge
